# Shared dorny/paths-filter config for the Two-Gate Check Model.
#
# These filters are used inside required workflows. Do not move them to
# workflow-level path filters, because skipped workflows can leave branch
# protection waiting for required checks.

product_runtime:
  - ".dockerignore"
  - "apps/**"
  - "compose.yaml"
  - "contracts/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "tests/e2e/**"
  - "uv.lock"

delivery_control:
  - ".github/actions/**"
  - ".github/workflows/**"
  - ".github/utils/change-filters.yaml"
  - ".github/utils/*.py"
  - ".github/utils/**/*.py"
  - ".github/dependabot.yml"
