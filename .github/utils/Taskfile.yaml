version: "3"

vars:
  REPO_ROOT:
    sh: git -C "{{.TASKFILE_DIR}}/../.." rev-parse --show-toplevel

tasks:
  image-repo:
    desc: "Emit the lowercase GHCR image repository for this GitHub repository"
    dir: "{{.REPO_ROOT}}"
    cmds:
      - |
        set -euo pipefail

        if [[ -z "${IMAGE_REPO:-}" && -z "${GITHUB_REPOSITORY:-}" ]]; then
          echo "Set IMAGE_REPO or run inside GitHub Actions with GITHUB_REPOSITORY." >&2
          exit 1
        fi

        image="${IMAGE_REPO:-ghcr.io/${GITHUB_REPOSITORY}}"
        echo "${image}" | tr '[:upper:]' '[:lower:]'
    silent: true

  validate-release-config:
    desc: "Validate Release Please config and the production GitOps manifest shape"
    dir: "{{.REPO_ROOT}}"
    cmds:
      - |
        set -euo pipefail

        ruby <<'RUBY'
        require "json"
        require "yaml"

        release_config = JSON.parse(File.read(".github/utils/release-please-config.json"))
        release_manifest = JSON.parse(File.read(".github/utils/.release-please-manifest.json"))
        production_manifest = YAML.load_file("deploy/production/app.yaml")
        package_json = JSON.parse(File.read("package.json"))

        abort("Release Please must include v in tags") unless release_config["include-v-in-tag"] == true
        abort("Release Please must not include component names in tags") unless release_config["include-component-in-tag"] == false
        abort("Release Please manifest must track the root package") unless release_manifest.key?(".")
        abort("package.json must not be a release version source") if package_json.key?("version")

        web = production_manifest.fetch("services").find { |service| service.fetch("name") == "web" }
        abort("Production Manifest must define the web service") unless web

        image = web.fetch("image")
        abort("Production Manifest must reference GHCR") unless image.fetch("registry_type") == "GHCR"
        abort("Production Manifest must use image.digest") unless image["digest"].to_s.start_with?("sha256:")
        abort("Production Manifest must not use image.tag") if image.key?("tag")

        envs = web.fetch("envs").to_h { |env| [env.fetch("key"), env.fetch("value").to_s] }
        abort("Production Manifest must set APP_VERSION") if envs["APP_VERSION"].to_s.empty?
        abort("Production Manifest must set COMMIT_SHA") if envs["COMMIT_SHA"].to_s.empty?
        RUBY
