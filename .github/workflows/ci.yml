name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  product-checks:
    name: Product checks
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Resolve check routing
        id: changes
        uses: ./.github/actions/resolve-check-routing
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint GitHub Actions workflows
        if: steps.changes.outputs.delivery_control_checks_required == 'true'
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0
        with:
          version: 1.7.12

      - name: Validate release configuration
        run: python3 .github/utils/validate_release_config.py

      - name: Test release utilities
        run: python3 -m unittest discover -s .github/utils/tests -p 'test_*.py'

      - name: Skip heavy product checks
        if: steps.changes.outputs.product_checks_required != 'true'
        run: |
          echo "Heavy product checks are not required for these changes."

      - name: Set up pnpm
        if: steps.changes.outputs.product_checks_required == 'true'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Set up Node.js with pnpm cache
        if: steps.changes.outputs.product_checks_required == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Set up uv
        if: steps.changes.outputs.product_checks_required == 'true'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install dependencies
        if: steps.changes.outputs.product_checks_required == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run Web tests
        if: steps.changes.outputs.product_checks_required == 'true'
        run: pnpm --dir apps/web run test

      - name: Run Redis-backed API integration tests
        if: steps.changes.outputs.product_checks_required == 'true'
        env:
          HALLIGALLI_TEST_REDIS_URL: redis://localhost:6379/0
        run: |
          redis_container=halligalli-api-tests-redis
          cleanup() {
            docker rm --force "$redis_container" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          cleanup
          docker run --detach --name "$redis_container" --publish 6379:6379 \
            redis@sha256:62b5498c91778f738f0efbf0a6fd5b434011235a3e7b5f2ed4a2c0c63bb1c786
          for _ in $(seq 1 30); do
            if docker exec "$redis_container" redis-cli ping | grep --quiet PONG; then
              pnpm run test:api
              exit 0
            fi
            sleep 1
          done
          docker logs "$redis_container"
          exit 1

      - name: Typecheck
        if: steps.changes.outputs.product_checks_required == 'true'
        run: pnpm run typecheck

      - name: Build app
        if: steps.changes.outputs.product_checks_required == 'true'
        run: pnpm run build
