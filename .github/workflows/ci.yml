name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  product-checks:
    name: Product checks
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve check routing
        id: changes
        uses: ./.github/actions/resolve-check-routing
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enforce Production Manifest-only PRs
        if: github.event_name == 'pull_request' && steps.changes.outputs.production_manifest == 'true'
        shell: bash
        run: |
          set -euo pipefail

          changed_files="$(git diff --name-only --diff-filter=ACMRT \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}")"
          disallowed_files="$(printf '%s\n' "${changed_files}" | sed '/^deploy\/production\/app.yaml$/d' | sed '/^$/d')"

          if [[ -n "${disallowed_files}" ]]; then
            echo "Production Manifest PRs must only change deploy/production/app.yaml." >&2
            echo "Disallowed files:" >&2
            printf '%s\n' "${disallowed_files}" >&2
            exit 1
          fi

      - name: Lint GitHub Actions workflows
        if: steps.changes.outputs.delivery_control_checks_required == 'true'
        run: docker run --rm -v "${PWD}:/repo" --workdir /repo rhysd/actionlint:1.7.12 -color

      - name: Validate release configuration
        run: node .github/utils/validate-release-config.mjs

      - name: Skip heavy product checks
        if: steps.changes.outputs.product_checks_required != 'true'
        run: |
          echo "Heavy product checks are not required for these changes."

      - name: Set up pnpm
        if: steps.changes.outputs.product_checks_required == 'true'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Set up Node.js
        if: steps.changes.outputs.product_checks_required == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        if: steps.changes.outputs.product_checks_required == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run tests
        if: steps.changes.outputs.product_checks_required == 'true'
        run: pnpm run test

      - name: Typecheck
        if: steps.changes.outputs.product_checks_required == 'true'
        run: pnpm run typecheck

      - name: Build app
        if: steps.changes.outputs.product_checks_required == 'true'
        run: pnpm run build
