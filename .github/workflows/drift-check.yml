name: Production Drift Check

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift-check:
    name: Production drift check
    runs-on: ubuntu-24.04
    environment:
      name: do-production
      url: ${{ vars.DO_PRODUCTION_URL }}

    env:
      DO_APP_ID: ${{ vars.DO_APP_ID }}
      DO_PRODUCTION_URL: ${{ vars.DO_PRODUCTION_URL }}
      SPEC_PATH: deploy/production/app.yaml

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate release configuration
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${DO_APP_ID}" ]]; then
            echo "Set environment variable DO_APP_ID to the DigitalOcean App Platform app ID." >&2
            exit 1
          fi

          if [[ -z "${DO_PRODUCTION_URL}" ]]; then
            echo "Set environment variable DO_PRODUCTION_URL to the live production URL." >&2
            exit 1
          fi

      - name: Set up doctl
        uses: digitalocean/action-doctl@3cb3953159719656269e044e0e24ca16dd2a690f # v2.5.2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Fetch live DO app spec
        shell: bash
        run: |
          set -euo pipefail
          doctl apps spec get "${DO_APP_ID}" --format json > live-app-spec.json

      - name: Compare Production Manifest with DO app spec
        id: manifest
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/utils/compare_production_drift.py

      - name: Compare /health with Production Manifest
        shell: bash
        env:
          EXPECTED_VERSION: ${{ steps.manifest.outputs.app_version }}
          EXPECTED_COMMIT: ${{ steps.manifest.outputs.commit_sha }}
        run: |
          set -euo pipefail

          health_url="${DO_PRODUCTION_URL%/}/health"
          response="$(curl --fail --silent --show-error "${health_url}")"

          export HEALTH_RESPONSE="${response}"
          export SUCCESS_MESSAGE="Production /health matches the Production Manifest."
          python3 .github/utils/check_health.py
