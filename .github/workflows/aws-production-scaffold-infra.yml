---
name: AWS Production Scaffold Infrastructure

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Terraform infrastructure operation to run manually.
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - scale-down
          - destroy
      confirm:
        description: >-
          Type PRODUCTION_SCAFFOLD_APPLY, PRODUCTION_SCAFFOLD_SCALE_DOWN,
          or PRODUCTION_SCAFFOLD_DESTROY for mutating operations.
        required: false
        type: string

permissions:
  contents: read

env:
  AWS_REGION: eu-west-1
  TERRAFORM_IMAGE: hashicorp/terraform:1.15.4

jobs:
  validate:
    name: Validate AWS Production Scaffold Terraform
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run release utility validation
        run: python3 .github/utils/validate_release_config.py

      - name: Terraform format check
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            --workdir /workspace/deploy/aws \
            "${TERRAFORM_IMAGE}" \
            fmt -check -recursive

      - name: Terraform init without backend
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            --workdir /workspace/deploy/aws \
            "${TERRAFORM_IMAGE}" \
            init -backend=false -input=false

      - name: Terraform validate
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            --workdir /workspace/deploy/aws \
            "${TERRAFORM_IMAGE}" \
            validate -no-color

  infrastructure:
    name: Run AWS Production Scaffold Terraform
    needs: validate
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    environment:
      name: aws-production-scaffold
      url: ${{ vars.HCP_TERRAFORM_WORKSPACE_URL }}

    env:
      AWS_PRODUCTION_SCAFFOLD_TERRAFORM_OPERATION: ${{ inputs.operation }}
      AWS_PRODUCTION_SCAFFOLD_TERRAFORM_ROLE_ARN: ${{ vars.AWS_PRODUCTION_SCAFFOLD_TERRAFORM_ROLE_ARN }}
      AWS_PRODUCTION_SCAFFOLD_PROJECT_NAME: ${{ vars.AWS_PRODUCTION_SCAFFOLD_PROJECT_NAME }}
      AWS_PRODUCTION_SCAFFOLD_AWS_REGION: ${{ vars.AWS_PRODUCTION_SCAFFOLD_AWS_REGION }}
      AWS_PRODUCTION_SCAFFOLD_DOMAIN_NAME: ${{ vars.AWS_PRODUCTION_SCAFFOLD_DOMAIN_NAME }}
      AWS_PRODUCTION_SCAFFOLD_FRONTEND_SUBDOMAIN: ${{ vars.AWS_PRODUCTION_SCAFFOLD_FRONTEND_SUBDOMAIN }}
      AWS_PRODUCTION_SCAFFOLD_BACKEND_SUBDOMAIN: ${{ vars.AWS_PRODUCTION_SCAFFOLD_BACKEND_SUBDOMAIN }}
      AWS_PRODUCTION_SCAFFOLD_ROUTE53_ZONE_ID: ${{ vars.AWS_PRODUCTION_SCAFFOLD_ROUTE53_ZONE_ID }}
      AWS_PRODUCTION_SCAFFOLD_FRONTEND_CLOUDFRONT_ENABLED: >-
        ${{ vars.AWS_PRODUCTION_SCAFFOLD_FRONTEND_CLOUDFRONT_ENABLED }}
      AWS_PRODUCTION_SCAFFOLD_BACKEND_CERTIFICATE_ARN: ${{ vars.AWS_PRODUCTION_SCAFFOLD_BACKEND_CERTIFICATE_ARN }}
      AWS_PRODUCTION_SCAFFOLD_BACKEND_IMAGE_TAG: ${{ vars.AWS_PRODUCTION_SCAFFOLD_BACKEND_IMAGE_TAG }}
      AWS_PRODUCTION_SCAFFOLD_BACKEND_DESIRED_COUNT: ${{ vars.AWS_PRODUCTION_SCAFFOLD_BACKEND_DESIRED_COUNT }}
      AWS_PRODUCTION_SCAFFOLD_BACKEND_TASK_CPU: ${{ vars.AWS_PRODUCTION_SCAFFOLD_BACKEND_TASK_CPU }}
      AWS_PRODUCTION_SCAFFOLD_BACKEND_TASK_MEMORY: ${{ vars.AWS_PRODUCTION_SCAFFOLD_BACKEND_TASK_MEMORY }}
      AWS_PRODUCTION_SCAFFOLD_BACKEND_APP_VERSION: ${{ vars.AWS_PRODUCTION_SCAFFOLD_BACKEND_APP_VERSION }}
      AWS_PRODUCTION_SCAFFOLD_BACKEND_COMMIT_SHA: ${{ vars.AWS_PRODUCTION_SCAFFOLD_BACKEND_COMMIT_SHA }}
      AWS_PRODUCTION_SCAFFOLD_GITHUB_REPOSITORY: ${{ vars.AWS_PRODUCTION_SCAFFOLD_GITHUB_REPOSITORY }}
      AWS_PRODUCTION_SCAFFOLD_GITHUB_OIDC_PROVIDER_ARN: ${{ vars.AWS_PRODUCTION_SCAFFOLD_GITHUB_OIDC_PROVIDER_ARN }}
      AWS_PRODUCTION_SCAFFOLD_GITHUB_OIDC_SUBJECTS: ${{ vars.AWS_PRODUCTION_SCAFFOLD_GITHUB_OIDC_SUBJECTS }}
      HCP_TERRAFORM_ORGANIZATION: ${{ vars.HCP_TERRAFORM_ORGANIZATION }}
      HCP_TERRAFORM_WORKSPACE: ${{ vars.HCP_TERRAFORM_WORKSPACE }}
      TF_TOKEN_app_terraform_io: ${{ secrets.HCP_TERRAFORM_TOKEN }}

    steps:
      - name: Check out repository
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Require explicit confirmation
        shell: bash
        env:
          CONFIRM_INPUT: ${{ inputs.confirm }}
          OPERATION_INPUT: ${{ inputs.operation }}
        run: |
          set -euo pipefail

          expected=""
          case "${OPERATION_INPUT}" in
            plan)
              exit 0
              ;;
            apply)
              expected="PRODUCTION_SCAFFOLD_APPLY"
              ;;
            scale-down)
              expected="PRODUCTION_SCAFFOLD_SCALE_DOWN"
              ;;
            destroy)
              expected="PRODUCTION_SCAFFOLD_DESTROY"
              ;;
          esac

          if [[ "${CONFIRM_INPUT}" != "${expected}" ]]; then
            echo "Re-run with confirm set to ${expected}." >&2
            exit 1
          fi

      - name: Validate Terraform role configuration
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${AWS_PRODUCTION_SCAFFOLD_TERRAFORM_ROLE_ARN}" ]]; then
            echo "Set AWS_PRODUCTION_SCAFFOLD_TERRAFORM_ROLE_ARN in the aws-production-scaffold GitHub environment." >&2
            exit 1
          fi

          if [[ -z "${TF_TOKEN_app_terraform_io}" ]]; then
            echo "Set HCP_TERRAFORM_TOKEN as an aws-production-scaffold GitHub environment secret." >&2
            exit 1
          fi

      - name: Configure AWS credentials
        # v6.2.0
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b
        with:
          role-to-assume: ${{ env.AWS_PRODUCTION_SCAFFOLD_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate private Terraform config
        shell: bash
        env:
          TERRAFORM_BACKEND_CONFIG_PATH: ${{ runner.temp }}/backend.hcl
          TERRAFORM_TFVARS_JSON_PATH: ${{ runner.temp }}/terraform.auto.tfvars.json
        run: |
          set -euo pipefail
          python3 .github/utils/write_terraform_scaffold_config.py

      - name: Terraform init with HCP remote state
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e AWS_SESSION_TOKEN \
            -e AWS_REGION \
            -e AWS_DEFAULT_REGION="${AWS_REGION}" \
            -e TF_TOKEN_app_terraform_io \
            -v "${PWD}:/workspace" \
            -v "${RUNNER_TEMP}:/runner-temp" \
            --workdir /workspace/deploy/aws \
            "${TERRAFORM_IMAGE}" \
            init -backend-config=/runner-temp/backend.hcl -input=false

      - name: Terraform plan
        if: inputs.operation == 'plan'
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e AWS_SESSION_TOKEN \
            -e AWS_REGION \
            -e AWS_DEFAULT_REGION="${AWS_REGION}" \
            -e TF_TOKEN_app_terraform_io \
            -v "${PWD}:/workspace" \
            -v "${RUNNER_TEMP}:/runner-temp" \
            --workdir /workspace/deploy/aws \
            "${TERRAFORM_IMAGE}" \
            plan -no-color -var-file=/runner-temp/terraform.auto.tfvars.json

      - name: Terraform apply saved plan
        if: inputs.operation == 'apply' || inputs.operation == 'scale-down'
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e AWS_SESSION_TOKEN \
            -e AWS_REGION \
            -e AWS_DEFAULT_REGION="${AWS_REGION}" \
            -e TF_TOKEN_app_terraform_io \
            -v "${PWD}:/workspace" \
            -v "${RUNNER_TEMP}:/runner-temp" \
            --workdir /workspace/deploy/aws \
            "${TERRAFORM_IMAGE}" \
            plan -no-color -out=/runner-temp/tfplan -var-file=/runner-temp/terraform.auto.tfvars.json

          docker run --rm \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e AWS_SESSION_TOKEN \
            -e AWS_REGION \
            -e AWS_DEFAULT_REGION="${AWS_REGION}" \
            -e TF_TOKEN_app_terraform_io \
            -v "${PWD}:/workspace" \
            -v "${RUNNER_TEMP}:/runner-temp" \
            --workdir /workspace/deploy/aws \
            "${TERRAFORM_IMAGE}" \
            apply -no-color /runner-temp/tfplan

      - name: Terraform destroy saved plan
        if: inputs.operation == 'destroy'
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e AWS_SESSION_TOKEN \
            -e AWS_REGION \
            -e AWS_DEFAULT_REGION="${AWS_REGION}" \
            -e TF_TOKEN_app_terraform_io \
            -v "${PWD}:/workspace" \
            -v "${RUNNER_TEMP}:/runner-temp" \
            --workdir /workspace/deploy/aws \
            "${TERRAFORM_IMAGE}" \
            plan -destroy -no-color -out=/runner-temp/tfplan -var-file=/runner-temp/terraform.auto.tfvars.json

          docker run --rm \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e AWS_SESSION_TOKEN \
            -e AWS_REGION \
            -e AWS_DEFAULT_REGION="${AWS_REGION}" \
            -e TF_TOKEN_app_terraform_io \
            -v "${PWD}:/workspace" \
            -v "${RUNNER_TEMP}:/runner-temp" \
            --workdir /workspace/deploy/aws \
            "${TERRAFORM_IMAGE}" \
            apply -no-color /runner-temp/tfplan
