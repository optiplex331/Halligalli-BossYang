---
name: AWS Staging Scaffold

on:
  workflow_dispatch:
    inputs:
      operation:
        description: AWS Staging operation to run manually.
        required: true
        default: validate
        type: choice
        options:
          - validate
          - deploy-frontend
          - deploy-backend
          - smoke-backend
      confirm_cost:
        description: Type STAGING_APPLY to allow AWS-mutating deploy operations.
        required: false
        type: string
      backend_image_tag:
        description: >-
          Optional ECR image tag for deploy-backend.
          Defaults to staging-<sha>-<run-number>.
        required: false
        type: string
      expected_version:
        description: Optional expected APP_VERSION for smoke-backend health validation.
        required: false
        type: string
      expected_commit:
        description: Optional expected COMMIT_SHA for smoke-backend health validation.
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-1
  AWS_STAGING_FRONTEND_URL: https://play.halligalli.games
  AWS_STAGING_BACKEND_URL: https://api.halligalli.games

jobs:
  validate:
    name: Validate AWS Staging scaffold
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run release utility validation
        run: python3 .github/utils/validate_release_config.py

      - name: Terraform format check
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            --workdir /workspace/deploy/aws-staging \
            hashicorp/terraform:1.15.4 \
            fmt -check -recursive

      - name: Terraform init without backend
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            --workdir /workspace/deploy/aws-staging \
            hashicorp/terraform:1.15.4 \
            init -backend=false -input=false

      - name: Terraform validate
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            --workdir /workspace/deploy/aws-staging \
            hashicorp/terraform:1.15.4 \
            validate -no-color

  guard-mutating-operation:
    name: Guard AWS-mutating operation
    if: >-
      inputs.operation != 'validate' &&
      inputs.operation != 'smoke-backend' &&
      inputs.confirm_cost != 'STAGING_APPLY'
    runs-on: ubuntu-24.04
    steps:
      - name: Require explicit cost confirmation
        run: |
          echo "AWS Staging deploy operations are manual and cost-aware." >&2
          echo "Re-run with confirm_cost set to STAGING_APPLY to continue." >&2
          exit 1

  deploy-frontend:
    name: Deploy AWS Staging frontend
    needs: validate
    if: >-
      inputs.operation == 'deploy-frontend' &&
      inputs.confirm_cost == 'STAGING_APPLY'
    runs-on: ubuntu-24.04
    environment:
      name: aws-staging
      url: ${{ env.AWS_STAGING_FRONTEND_URL }}

    env:
      AWS_STAGING_ROLE_ARN: ${{ vars.AWS_STAGING_ROLE_ARN }}
      AWS_STAGING_FRONTEND_BUCKET: ${{ vars.AWS_STAGING_FRONTEND_BUCKET }}
      AWS_STAGING_CLOUDFRONT_DISTRIBUTION_ID: >-
        ${{ vars.AWS_STAGING_CLOUDFRONT_DISTRIBUTION_ID }}
      VITE_HALLIGALLI_BACKEND_URL: https://api.halligalli.games

    steps:
      - name: Check out repository
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Validate AWS OIDC role configuration
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${AWS_STAGING_ROLE_ARN}" ]]; then
            echo "Set AWS_STAGING_ROLE_ARN in the aws-staging GitHub environment." >&2
            exit 1
          fi

      - name: Configure AWS credentials
        # v6.2.0
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b
        with:
          role-to-assume: ${{ env.AWS_STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up pnpm
        # v6.0.8
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          run_install: false

      - name: Set up Node.js with pnpm cache
        # v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Validate frontend deploy configuration
        shell: bash
        run: |
          set -euo pipefail

          required=(
            AWS_STAGING_FRONTEND_BUCKET
            AWS_STAGING_CLOUDFRONT_DISTRIBUTION_ID
          )

          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              printf 'Set %s in the aws-staging GitHub environment.\n' \
                "${name}" >&2
              exit 1
            fi
          done

          aws --version

      - name: Build frontend for AWS Staging
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Publish static assets to S3
        shell: bash
        run: |
          set -euo pipefail
          aws s3 sync dist/ "s3://${AWS_STAGING_FRONTEND_BUCKET}/" \
            --delete \
            --exclude "server/*"

      - name: Invalidate CloudFront cache
        shell: bash
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id "${AWS_STAGING_CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"

  deploy-backend:
    name: Deploy AWS Staging backend
    needs: validate
    if: >-
      inputs.operation == 'deploy-backend' &&
      inputs.confirm_cost == 'STAGING_APPLY'
    runs-on: ubuntu-24.04
    environment:
      name: aws-staging
      url: ${{ env.AWS_STAGING_BACKEND_URL }}

    env:
      AWS_STAGING_ROLE_ARN: ${{ vars.AWS_STAGING_ROLE_ARN }}
      AWS_STAGING_ECR_REGISTRY: ${{ vars.AWS_STAGING_ECR_REGISTRY }}
      AWS_STAGING_ECR_REPOSITORY: ${{ vars.AWS_STAGING_ECR_REPOSITORY }}
      AWS_STAGING_ECS_CLUSTER: ${{ vars.AWS_STAGING_ECS_CLUSTER }}
      AWS_STAGING_ECS_SERVICE: ${{ vars.AWS_STAGING_ECS_SERVICE }}
      AWS_STAGING_TASK_FAMILY: ${{ vars.AWS_STAGING_TASK_FAMILY }}
      AWS_STAGING_CONTAINER_NAME: ${{ vars.AWS_STAGING_CONTAINER_NAME }}

    steps:
      - name: Check out repository
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Validate AWS OIDC role configuration
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${AWS_STAGING_ROLE_ARN}" ]]; then
            echo "Set AWS_STAGING_ROLE_ARN in the aws-staging GitHub environment." >&2
            exit 1
          fi

      - name: Configure AWS credentials
        # v6.2.0
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b
        with:
          role-to-assume: ${{ env.AWS_STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        # v4.1.0
        # yamllint disable-line rule:line-length
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Validate backend deploy configuration
        shell: bash
        run: |
          set -euo pipefail

          required=(
            AWS_STAGING_ECR_REGISTRY
            AWS_STAGING_ECR_REPOSITORY
            AWS_STAGING_ECS_CLUSTER
            AWS_STAGING_ECS_SERVICE
            AWS_STAGING_TASK_FAMILY
            AWS_STAGING_CONTAINER_NAME
          )

          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              printf 'Set %s in the aws-staging GitHub environment.\n' \
                "${name}" >&2
              exit 1
            fi
          done

          aws --version

      - name: Resolve staging image
        id: image
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ inputs.backend_image_tag }}"
          if [[ -z "${tag}" ]]; then
            tag="staging-${GITHUB_SHA::7}-${GITHUB_RUN_NUMBER}"
          fi

          image="${AWS_STAGING_ECR_REGISTRY}/${AWS_STAGING_ECR_REPOSITORY}:${tag}"
          commit_sha="$(git rev-parse HEAD)"

          {
            echo "tag=${tag}"
            echo "image=${image}"
            echo "commit_sha=${commit_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to ECR
        shell: bash
        run: |
          set -euo pipefail
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login \
              --username AWS \
              --password-stdin "${AWS_STAGING_ECR_REGISTRY}"

      - name: Build and push backend image
        shell: bash
        env:
          COMMIT_SHA: ${{ steps.image.outputs.commit_sha }}
          IMAGE: ${{ steps.image.outputs.image }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
          SOURCE_URL: https://github.com/${{ github.repository }}
        run: |
          set -euo pipefail

          docker build \
            --build-arg APP_VERSION="${IMAGE_TAG}" \
            --build-arg COMMIT_SHA="${COMMIT_SHA}" \
            --label "org.opencontainers.image.version=${IMAGE_TAG}" \
            --label "org.opencontainers.image.revision=${COMMIT_SHA}" \
            --label "org.opencontainers.image.source=${SOURCE_URL}" \
            --tag "${IMAGE}" \
            .

          docker push "${IMAGE}"

      - name: Register ECS task definition revision
        id: task
        shell: bash
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          APP_VERSION: ${{ steps.image.outputs.tag }}
          COMMIT_SHA: ${{ steps.image.outputs.commit_sha }}
        run: |
          set -euo pipefail

          aws ecs describe-task-definition \
            --task-definition "${AWS_STAGING_TASK_FAMILY}" \
            --query taskDefinition \
            > task-definition.json

          jq \
            --arg image "${IMAGE}" \
            --arg container "${AWS_STAGING_CONTAINER_NAME}" \
            --arg app_version "${APP_VERSION}" \
            --arg commit_sha "${COMMIT_SHA}" \
            'del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions = (
              .containerDefinitions
              | map(if .name == $container then
                  .image = $image
                  | .environment = (
                    (.environment // [])
                    | map(select(.name != "APP_VERSION" and .name != "COMMIT_SHA"))
                    + [
                      {"name": "APP_VERSION", "value": $app_version},
                      {"name": "COMMIT_SHA", "value": $commit_sha}
                    ]
                  )
                else . end)
            )' \
            task-definition.json > next-task-definition.json

          task_definition_arn="$(aws ecs register-task-definition \
            --cli-input-json file://next-task-definition.json \
            --query taskDefinition.taskDefinitionArn \
            --output text)"

          echo "task_definition_arn=${task_definition_arn}" \
            >> "${GITHUB_OUTPUT}"

      - name: Update ECS service
        shell: bash
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${AWS_STAGING_ECS_CLUSTER}" \
            --service "${AWS_STAGING_ECS_SERVICE}" \
            --task-definition "${{ steps.task.outputs.task_definition_arn }}" \
            --force-new-deployment

      - name: Wait for backend service stability
        shell: bash
        run: |
          set -euo pipefail
          aws ecs wait services-stable \
            --cluster "${AWS_STAGING_ECS_CLUSTER}" \
            --services "${AWS_STAGING_ECS_SERVICE}"

      - name: Smoke test backend readiness and health
        shell: bash
        env:
          EXPECTED_VERSION: ${{ steps.image.outputs.tag }}
          EXPECTED_COMMIT: ${{ steps.image.outputs.commit_sha }}
        run: |
          set -euo pipefail

          curl --fail --silent --show-error "${AWS_STAGING_BACKEND_URL}/readyz"

          response="$(
            curl --fail --silent --show-error \
              "${AWS_STAGING_BACKEND_URL}/health"
          )"
          export HEALTH_RESPONSE="${response}"
          export SUCCESS_MESSAGE
          SUCCESS_MESSAGE="AWS Staging /health matches deployed identity."
          python3 .github/utils/check_health.py

  smoke-backend:
    name: Smoke AWS Staging backend
    needs: validate
    if: inputs.operation == 'smoke-backend'
    runs-on: ubuntu-24.04

    steps:
      - name: Check readiness and health
        shell: bash
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
        run: |
          set -euo pipefail

          curl --fail --silent --show-error "${AWS_STAGING_BACKEND_URL}/readyz"
          response="$(curl --fail --silent --show-error "${AWS_STAGING_BACKEND_URL}/health")"

          if [[ -n "${EXPECTED_VERSION}" || -n "${EXPECTED_COMMIT}" ]]; then
            if [[ -z "${EXPECTED_VERSION}" || -z "${EXPECTED_COMMIT}" ]]; then
              echo "Set both expected_version and expected_commit, or leave both empty." >&2
              exit 1
            fi

            export HEALTH_RESPONSE="${response}"
            export SUCCESS_MESSAGE
            SUCCESS_MESSAGE="AWS Staging /health matches expected identity."
            python3 .github/utils/check_health.py
          else
            echo "${response}"
          fi
