name: Release DO Production

on:
  workflow_run:
    workflows:
      - Container
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: do-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy DO Production
    if: (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master') || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: do-production
      url: ${{ vars.DO_PRODUCTION_URL }}

    env:
      DO_APP_ID: ${{ vars.DO_APP_ID }}
      DO_PRODUCTION_URL: ${{ vars.DO_PRODUCTION_URL }}

    steps:
      - name: Check out released commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || 'master' }}
          fetch-depth: 0

      - name: Set up Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.x

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail

          image="$(task -s -t .github/utils/Taskfile.yaml image-repo)"
          version_tag="$(task -s -t .github/utils/Taskfile.yaml generate-extended-version)"
          image_tag="$(task -s -t .github/utils/Taskfile.yaml generate-extended-version-tag)"
          commit_sha="$(git rev-parse HEAD)"

          {
            echo "image=${image}"
            echo "version_tag=${version_tag}"
            echo "image_tag=${image_tag}"
            echo "commit_sha=${commit_sha}"
          } >> "${GITHUB_OUTPUT}"

          echo "Release commit: ${commit_sha}"
          echo "App version: ${version_tag}"
          echo "GHCR image: ${image_tag}"

      - name: Validate release configuration
        shell: bash
        env:
          DO_GHCR_USERNAME: ${{ vars.DO_GHCR_USERNAME }}
          DO_GHCR_TOKEN: ${{ secrets.DO_GHCR_TOKEN }}
        run: |
          set -euo pipefail

          : "${DO_APP_ID:?Set repository variable DO_APP_ID to the DigitalOcean App Platform app ID.}"
          : "${DO_PRODUCTION_URL:?Set repository variable DO_PRODUCTION_URL to the live production URL.}"
          if [[ -n "${DO_GHCR_USERNAME:-}" || -n "${DO_GHCR_TOKEN:-}" ]]; then
            : "${DO_GHCR_USERNAME:?Set repository variable DO_GHCR_USERNAME when DO_GHCR_TOKEN is set.}"
            : "${DO_GHCR_TOKEN:?Set repository secret DO_GHCR_TOKEN when DO_GHCR_USERNAME is set.}"
          fi

      - name: Set up doctl
        uses: digitalocean/action-doctl@3cb3953159719656269e044e0e24ca16dd2a690f # v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Render release app spec
        shell: bash
        env:
          APP_VERSION: ${{ steps.release.outputs.version_tag }}
          COMMIT_SHA: ${{ steps.release.outputs.commit_sha }}
          IMAGE_TAG: ${{ steps.release.outputs.version_tag }}
          DO_GHCR_USERNAME: ${{ vars.DO_GHCR_USERNAME }}
          DO_GHCR_TOKEN: ${{ secrets.DO_GHCR_TOKEN }}
        run: |
          set -euo pipefail

          spec_path="${RUNNER_TEMP}/app.release.yaml"

          if [[ -n "${DO_GHCR_USERNAME:-}" ]]; then
            export GHCR_REGISTRY_CREDENTIALS="${DO_GHCR_USERNAME}:${DO_GHCR_TOKEN}"
          fi

          task -s -t .github/utils/Taskfile.yaml render-do-app-spec \
            OUTPUT_PATH="${spec_path}" \
            IMAGE_TAG="${IMAGE_TAG}" \
            APP_VERSION="${APP_VERSION}" \
            COMMIT_SHA="${COMMIT_SHA}"

          echo "spec_path=${spec_path}" >> "${GITHUB_ENV}"

      - name: Deploy via DigitalOcean
        id: deployment
        shell: bash
        run: |
          set -euo pipefail

          echo "Deploying DO app ${DO_APP_ID}"
          echo "Release commit ${{ steps.release.outputs.commit_sha }}"
          echo "GHCR image ${{ steps.release.outputs.image_tag }}"

          deployment_id="$(doctl apps update "${DO_APP_ID}" \
            --spec "${spec_path}" \
            --wait \
            --format ActiveDeployment.ID \
            --no-header | tail -n 1 | tr -d '[:space:]')"

          if [[ -z "${deployment_id}" ]]; then
            deployment_id="$(doctl apps list-deployments "${DO_APP_ID}" --format ID --no-header | head -n 1 | awk '{print $1}')"
          fi

          if [[ -z "${deployment_id}" ]]; then
            echo "DigitalOcean deployment finished but no deployment ID was returned." >&2
            exit 1
          fi

          echo "deployment_id=${deployment_id}" >> "${GITHUB_OUTPUT}"
          echo "DO deployment ID: ${deployment_id}"

      - name: Smoke test /health
        shell: bash
        env:
          EXPECTED_VERSION: ${{ steps.release.outputs.version_tag }}
          EXPECTED_COMMIT: ${{ steps.release.outputs.commit_sha }}
        run: |
          set -euo pipefail

          health_url="${DO_PRODUCTION_URL%/}/health"
          echo "Smoke testing ${health_url}"

          for attempt in {1..12}; do
            response="$(curl --fail --silent --show-error "${health_url}" || true)"

            if HEALTH_RESPONSE="${response}" node <<'NODE'
            const body = process.env.HEALTH_RESPONSE;
            let health;

            try {
              health = JSON.parse(body);
            } catch {
              console.error("Health response is not valid JSON:", body);
              process.exit(1);
            }

            const expectedVersion = process.env.EXPECTED_VERSION;
            const expectedCommit = process.env.EXPECTED_COMMIT;

            if (health.status !== "ok") {
              console.error("Unexpected health status:", health);
              process.exit(1);
            }

            if (health.version !== expectedVersion || health.commit !== expectedCommit) {
              console.error("Release identity mismatch:", {
                expectedVersion,
                actualVersion: health.version,
                expectedCommit,
                actualCommit: health.commit,
              });
              process.exit(1);
            }
          NODE
            then
              echo "Smoke test passed for deployment ${{ steps.deployment.outputs.deployment_id }}"
              exit 0
            fi

            echo "Health check attempt ${attempt} did not match the release yet."
            sleep 10
          done

          echo "Production /health did not report the expected release metadata." >&2
          exit 1
