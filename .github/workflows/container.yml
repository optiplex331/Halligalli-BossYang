name: Container

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-scan-publish:
    name: Container build and scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.13.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Resolve image version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          image="$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"

          if describe="$(git describe --tags --match 'v[0-9]*.[0-9]*.[0-9]*' --long --abbrev=7 2>/dev/null)"; then
            base="${describe%%-*}"
            rest="${describe#*-}"
            distance="${rest%%-*}"
            short_sha="${describe##*-g}"
            base="${base#v}"
          else
            base="$(node -p "require('./package.json').version")"
            distance="$(git rev-list --count HEAD)"
            short_sha="$(git rev-parse --short=7 HEAD)"
          fi

          version_tag="${base}-$(printf "%04d" "${distance}")-g${short_sha}"
          commit_sha="$(git rev-parse HEAD)"

          {
            echo "image=${image}"
            echo "version_tag=${version_tag}"
            echo "commit_sha=${commit_sha}"
            echo "should_push=$([[ "${GITHUB_REF}" == "refs/heads/master" && "${GITHUB_EVENT_NAME}" != "pull_request" ]] && echo true || echo false)"
          } >> "${GITHUB_OUTPUT}"

          echo "Image: ${image}"
          echo "Version tag: ${version_tag}"
          echo "Commit SHA: ${commit_sha}"

      - name: Build image
        shell: bash
        run: |
          set -euo pipefail

          docker build \
            --build-arg APP_VERSION="${{ steps.release.outputs.version_tag }}" \
            --build-arg COMMIT_SHA="${{ steps.release.outputs.commit_sha }}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${{ steps.release.outputs.commit_sha }}" \
            --label "org.opencontainers.image.version=${{ steps.release.outputs.version_tag }}" \
            --tag "${{ steps.release.outputs.image }}:${{ steps.release.outputs.version_tag }}" \
            --tag "${{ steps.release.outputs.image }}:latest" \
            .

      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.release.outputs.image }}:${{ steps.release.outputs.version_tag }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Log in to GHCR
        if: steps.release.outputs.should_push == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: steps.release.outputs.should_push == 'true'
        shell: bash
        run: |
          set -euo pipefail

          docker push "${{ steps.release.outputs.image }}:${{ steps.release.outputs.version_tag }}"
          docker push "${{ steps.release.outputs.image }}:latest"

          echo "Published ${{ steps.release.outputs.image }}:${{ steps.release.outputs.version_tag }}"
          echo "Published ${{ steps.release.outputs.image }}:latest"
