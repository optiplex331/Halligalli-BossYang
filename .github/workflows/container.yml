name: Container

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-scan-publish:
    name: Container build and scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      should_publish_attestation: ${{ steps.release.outputs.should_push_image }}

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Resolve check routing
        id: changes
        uses: ./.github/actions/resolve-check-routing
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip container build and scan
        if: steps.changes.outputs.container_build_required != 'true'
        run: |
          echo "Container build and scan are not required for ${{ steps.changes.outputs.classification }} changes."

      - name: Set up Docker Buildx
        if: steps.changes.outputs.container_build_required == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Resolve image identity
        if: steps.changes.outputs.container_build_required == 'true'
        id: release
        run: python3 .github/utils/resolve_image_identity.py

      - name: Build image
        if: steps.changes.outputs.container_build_required == 'true'
        shell: bash
        run: |
          set -euo pipefail

          docker build \
            --target standalone \
            --build-arg APP_VERSION="${{ steps.release.outputs.version }}" \
            --build-arg COMMIT_SHA="${{ steps.release.outputs.commit_sha }}" \
            --label "org.opencontainers.image.version=${{ steps.release.outputs.version }}" \
            --label "org.opencontainers.image.revision=${{ steps.release.outputs.commit_sha }}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --tag "${{ steps.release.outputs.image_tag }}" \
            .

      - name: Scan image
        if: steps.changes.outputs.container_build_required == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.release.outputs.image_tag }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Log in to GHCR
        if: steps.release.outputs.should_push_image == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: steps.release.outputs.should_push_image == 'true'
        id: push
        shell: bash
        run: |
          set -euo pipefail

          push_output="$(docker push "${{ steps.release.outputs.image_tag }}")"
          echo "${push_output}"

          image_digest="$(printf '%s\n' "${push_output}" | awk '/digest: sha256:/ {print $3; exit}')"

          if [[ -z "${image_digest}" ]]; then
            image_digest="$(docker buildx imagetools inspect "${{ steps.release.outputs.image_tag }}" --format '{{.Manifest.Digest}}')"
          fi

          if [[ -z "${image_digest}" ]]; then
            echo "Could not resolve pushed image digest." >&2
            exit 1
          fi

          echo "image_digest=${image_digest}" >> "${GITHUB_OUTPUT}"
          echo "Published ${{ steps.release.outputs.image_tag }} @ ${image_digest}"

      - name: Write release attestation
        if: github.ref_type == 'tag' && steps.release.outputs.should_push_image == 'true'
        run: |
          python3 .github/utils/release_attestation.py \
            --tag "${{ github.ref_name }}" \
            --commit "${{ steps.release.outputs.commit_sha }}" \
            --image "${{ steps.release.outputs.image_tag }}" \
            --digest "${{ steps.push.outputs.image_digest }}" \
            --output release-attestation.json

      - name: Publish release attestation
        if: github.ref_type == 'tag' && steps.release.outputs.should_push_image == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-attestation-${{ github.ref_name }}
          path: release-attestation.json
          if-no-files-found: error

  publish-release-attestation:
    name: Publish release attestation
    if: github.ref_type == 'tag' && needs.build-scan-publish.outputs.should_publish_attestation == 'true'
    needs: build-scan-publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download release attestation
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-attestation-${{ github.ref_name }}
          path: .release-attestation

      - name: Wait for GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          for attempt in 1 2 3 4 5 6; do
            if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              exit 0
            fi
            if [[ "${attempt}" == "6" ]]; then
              echo "GitHub Release ${GITHUB_REF_NAME} was not available after 30 seconds." >&2
              exit 1
            fi
            sleep 5
          done

      - name: Download existing Release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .existing-release-asset
          if gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern release-attestation.json \
            --dir .existing-release-asset; then
            echo "Found existing release-attestation.json for comparison."
          else
            echo "No existing release-attestation.json; publication will create it."
          fi

      - name: Assess Release asset publication
        id: asset
        shell: bash
        run: |
          set -euo pipefail

          python3 .github/utils/release_asset.py \
            --candidate .release-attestation/release-attestation.json \
            --existing .existing-release-asset/release-attestation.json

      - name: Upload Release asset
        if: steps.asset.outputs.action == 'upload'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${GITHUB_REF_NAME}"
          .release-attestation/release-attestation.json
          --repo "${GITHUB_REPOSITORY}"

      - name: Record Release asset evidence
        run: >-
          echo "release-attestation.json publication action:
          ${{ steps.asset.outputs.action }}; sha256:${{ steps.asset.outputs.sha256 }}"
          >> "${GITHUB_STEP_SUMMARY}"
