name: Container

on:
  pull_request:
    branches:
      - master
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  build-scan-publish:
    name: Container build and scan
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.release.outputs.image }}
      version: ${{ steps.release.outputs.version }}
      image_tag: ${{ steps.release.outputs.image_tag }}
      image_digest: ${{ steps.push.outputs.image_digest }}
      commit_sha: ${{ steps.release.outputs.commit_sha }}
      should_publish: ${{ steps.release.outputs.should_publish }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect changed file groups
        id: paths
        if: github.ref_type != 'tag'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: .github/utils/change-filters.yaml
          list-files: shell

      - name: Resolve check routing
        id: changes
        shell: bash
        env:
          FILTER_PRODUCT: ${{ steps.paths.outputs.product || 'false' }}
          FILTER_RELEASE_METADATA: ${{ steps.paths.outputs.release_metadata || 'false' }}
          FILTER_PRODUCTION_MANIFEST: ${{ steps.paths.outputs.production_manifest || 'false' }}
        run: |
          set -euo pipefail

          tag_release=false
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            tag_release=true
          fi

          product_required="${FILTER_PRODUCT}"
          container_required="${FILTER_PRODUCT}"
          release_metadata_changed="${FILTER_RELEASE_METADATA}"
          production_manifest_changed="${FILTER_PRODUCTION_MANIFEST}"

          if [[ "${tag_release}" == "true" || "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            container_required=true
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            product_required=true
          fi

          if [[ "${tag_release}" == "true" ]]; then
            classification="release-tag"
          elif [[ "${product_required}" == "true" ]]; then
            classification="product-runtime"
          elif [[ "${production_manifest_changed}" == "true" && "${release_metadata_changed}" != "true" ]]; then
            classification="production-manifest"
          elif [[ "${release_metadata_changed}" == "true" && "${production_manifest_changed}" != "true" ]]; then
            classification="release-metadata"
          elif [[ "${production_manifest_changed}" == "true" && "${release_metadata_changed}" == "true" ]]; then
            classification="release-and-production-metadata"
          else
            classification="metadata-or-docs"
          fi

          {
            echo "classification=${classification}"
            echo "product_checks_required=${product_required}"
            echo "container_build_required=${container_required}"
            echo "release_metadata_changed=${release_metadata_changed}"
            echo "production_manifest_changed=${production_manifest_changed}"
          } >> "${GITHUB_OUTPUT}"

          echo "classification=${classification}"
          echo "product_checks_required=${product_required}"
          echo "container_build_required=${container_required}"
          echo "release_metadata_changed=${release_metadata_changed}"
          echo "production_manifest_changed=${production_manifest_changed}"

      - name: Set up Docker Buildx
        if: steps.changes.outputs.container_build_required == 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Resolve image identity
        if: steps.changes.outputs.container_build_required == 'true'
        id: release
        shell: bash
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY}"
          image="$(echo "${image}" | tr '[:upper:]' '[:lower:]')"
          commit_sha="$(git rev-parse HEAD)"
          should_publish=false

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            version="${GITHUB_REF_NAME#v}"
            should_publish=true
          else
            version="pr-${GITHUB_SHA::7}"
          fi

          {
            echo "image=${image}"
            echo "version=${version}"
            echo "image_tag=${image}:${version}"
            echo "commit_sha=${commit_sha}"
            echo "should_publish=${should_publish}"
          } >> "${GITHUB_OUTPUT}"

          echo "Image: ${image}"
          echo "Version: ${version}"
          echo "Image tag: ${image}:${version}"
          echo "Commit SHA: ${commit_sha}"
          echo "Publish: ${should_publish}"

      - name: Build image
        if: steps.changes.outputs.container_build_required == 'true'
        shell: bash
        run: |
          set -euo pipefail

          docker build \
            --build-arg APP_VERSION="${{ steps.release.outputs.version }}" \
            --build-arg COMMIT_SHA="${{ steps.release.outputs.commit_sha }}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${{ steps.release.outputs.commit_sha }}" \
            --label "org.opencontainers.image.version=${{ steps.release.outputs.version }}" \
            --tag "${{ steps.release.outputs.image_tag }}" \
            .

      - name: Scan image
        if: steps.changes.outputs.container_build_required == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.release.outputs.image_tag }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Skip container build and scan
        if: steps.changes.outputs.container_build_required != 'true'
        run: |
          echo "Container build and scan are not required for ${{ steps.changes.outputs.classification }} changes."

      - name: Log in to GHCR
        if: steps.release.outputs.should_publish == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: steps.release.outputs.should_publish == 'true'
        id: push
        shell: bash
        run: |
          set -euo pipefail

          push_output="$(docker push "${{ steps.release.outputs.image_tag }}")"
          echo "${push_output}"

          image_digest="$(printf '%s\n' "${push_output}" | awk '/digest: sha256:/ {print $3; exit}')"
          if [[ -z "${image_digest}" ]]; then
            image_digest="$(docker buildx imagetools inspect "${{ steps.release.outputs.image_tag }}" --format '{{.Manifest.Digest}}')"
          fi

          if [[ -z "${image_digest}" ]]; then
            echo "Could not resolve pushed image digest." >&2
            exit 1
          fi

          echo "image_digest=${image_digest}" >> "${GITHUB_OUTPUT}"
          echo "Published ${{ steps.release.outputs.image_tag }} @ ${image_digest}"

  propose-production-promotion:
    name: Propose production promotion
    needs: build-scan-publish
    if: needs.build-scan-publish.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out master
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.HALLIGALLI_RELEASE_BOT_TOKEN }}

      - name: Update Production Manifest
        shell: bash
        env:
          VERSION: ${{ needs.build-scan-publish.outputs.version }}
          COMMIT_SHA: ${{ needs.build-scan-publish.outputs.commit_sha }}
          IMAGE_DIGEST: ${{ needs.build-scan-publish.outputs.image_digest }}
        run: |
          set -euo pipefail

          ruby <<'RUBY'
          require "yaml"

          path = "deploy/production/app.yaml"
          spec = YAML.load_file(path)
          web = spec.fetch("services").find { |service| service.fetch("name") == "web" }
          image = web.fetch("image")
          image.delete("tag")
          image["digest"] = ENV.fetch("IMAGE_DIGEST")

          envs = web.fetch("envs")
          envs.find { |env| env.fetch("key") == "APP_VERSION" }["value"] = ENV.fetch("VERSION")
          envs.find { |env| env.fetch("key") == "COMMIT_SHA" }["value"] = ENV.fetch("COMMIT_SHA")

          File.write(path, YAML.dump(spec).sub(/\A---\s*\n/, ""))
          RUBY

      - name: Open promotion PR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HALLIGALLI_RELEASE_BOT_TOKEN }}
          VERSION: ${{ needs.build-scan-publish.outputs.version }}
          COMMIT_SHA: ${{ needs.build-scan-publish.outputs.commit_sha }}
          IMAGE_TAG: ${{ needs.build-scan-publish.outputs.image_tag }}
          IMAGE_DIGEST: ${{ needs.build-scan-publish.outputs.image_digest }}
        run: |
          set -euo pipefail

          branch="release/promote-v${VERSION}-production"

          git config user.name "halligalli-release-bot"
          git config user.email "halligalli-release-bot@users.noreply.github.com"
          git checkout -B "${branch}"
          git add deploy/production/app.yaml

          if git diff --cached --quiet; then
            echo "Production Manifest already points at ${IMAGE_DIGEST}."
            exit 0
          fi

          git commit -m "chore(release): promote v${VERSION} to production"
          git push --force-with-lease origin "${branch}"

          body="$(mktemp)"
          cat > "${body}" <<BODY
          ## Production Promotion

          Promote Halligalli v${VERSION} to DO Production.

          - Image: \`${IMAGE_TAG}\`
          - Digest: \`${IMAGE_DIGEST}\`
          - Commit: \`${COMMIT_SHA}\`

          Merge this PR to trigger the GitOps Reconciler for \`deploy/production/app.yaml\`.
          BODY

          existing_pr="$(gh pr list --head "${branch}" --base master --json number --jq '.[0].number // empty')"
          if [[ -n "${existing_pr}" ]]; then
            gh pr edit "${existing_pr}" --title "chore(release): promote v${VERSION} to production" --body-file "${body}"
          else
            gh pr create \
              --base master \
              --head "${branch}" \
              --title "chore(release): promote v${VERSION} to production" \
              --body-file "${body}"
          fi
