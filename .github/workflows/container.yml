name: Container

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-scan-publish:
    name: Container build and scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: 3.x

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Resolve image version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          image="$(task -s -t .github/utils/Taskfile.yaml image-repo)"
          version_tag="$(task -s -t .github/utils/Taskfile.yaml generate-extended-version)"
          image_tag="$(task -s -t .github/utils/Taskfile.yaml generate-extended-version-tag)"
          commit_sha="$(git rev-parse HEAD)"

          {
            echo "image=${image}"
            echo "version_tag=${version_tag}"
            echo "image_tag=${image_tag}"
            echo "commit_sha=${commit_sha}"
            echo "should_push=$([[ "${GITHUB_REF}" == "refs/heads/master" && "${GITHUB_EVENT_NAME}" != "pull_request" ]] && echo true || echo false)"
          } >> "${GITHUB_OUTPUT}"

          echo "Image: ${image}"
          echo "Version tag: ${version_tag}"
          echo "Image tag: ${image_tag}"
          echo "Commit SHA: ${commit_sha}"

      - name: Build image
        shell: bash
        run: |
          set -euo pipefail

          docker build \
            --build-arg APP_VERSION="${{ steps.release.outputs.version_tag }}" \
            --build-arg COMMIT_SHA="${{ steps.release.outputs.commit_sha }}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${{ steps.release.outputs.commit_sha }}" \
            --label "org.opencontainers.image.version=${{ steps.release.outputs.version_tag }}" \
            --tag "${{ steps.release.outputs.image_tag }}" \
            --tag "${{ steps.release.outputs.image }}:latest" \
            .

      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.release.outputs.image_tag }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Log in to GHCR
        if: steps.release.outputs.should_push == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: steps.release.outputs.should_push == 'true'
        shell: bash
        run: |
          set -euo pipefail

          docker push "${{ steps.release.outputs.image_tag }}"
          docker push "${{ steps.release.outputs.image }}:latest"

          echo "Published ${{ steps.release.outputs.image_tag }}"
          echo "Published ${{ steps.release.outputs.image }}:latest"
