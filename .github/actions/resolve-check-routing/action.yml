name: Resolve check routing
description: Resolve shared CI and container routing from changed file groups.

inputs:
  token:
    description: GitHub token for pull request file detection.
    required: true

outputs:
  product_checks_required:
    description: Whether heavy product checks are required.
    value: ${{ steps.routing.outputs.product_checks_required }}
  delivery_control_checks_required:
    description: Whether delivery control checks are required.
    value: ${{ steps.routing.outputs.delivery_control_checks_required }}
  container_build_required:
    description: Whether the container build and scan are required.
    value: ${{ steps.routing.outputs.container_build_required }}

runs:
  using: composite
  steps:
    - name: Detect changed file groups
      id: paths
      if: github.ref_type != 'tag'
      uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
      with:
        token: ${{ inputs.token }}
        filters: .github/utils/change-filters.yaml

    - name: Resolve routing
      id: routing
      shell: bash
      env:
        PRODUCT_RUNTIME: ${{ steps.paths.outputs.product_runtime || 'false' }}
        DELIVERY_CONTROL: ${{ steps.paths.outputs.delivery_control || 'false' }}
      run: |
        set -euo pipefail

        echo "::group::Check routing"
        python3 .github/utils/resolve_check_routing.py
        echo "::endgroup::"
