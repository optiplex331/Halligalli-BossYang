<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Halligalli Arena icon</title>
  <desc id="desc">Three fruit-count cards on a dark casino table.</desc>
  <defs>
    <radialGradient id="bg" cx="33%" cy="19%" r="88%">
      <stop offset="0" stop-color="#2b7652"/>
      <stop offset="0.42" stop-color="#113623"/>
      <stop offset="1" stop-color="#05080f"/>
    </radialGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf5"/>
      <stop offset="0.58" stop-color="#f2eadb"/>
      <stop offset="1" stop-color="#dfd0b7"/>
    </linearGradient>
    <filter id="shadow" x="-32%" y="-32%" width="164%" height="164%">
      <feDropShadow dx="0" dy="24" stdDeviation="16" flood-color="#020409" flood-opacity=".5"/>
    </filter>
    <filter id="soft-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#020409" flood-opacity=".28"/>
    </filter>
    <symbol id="strawberry" viewBox="0 0 64 64">
      <path d="M32 57C19 47 12 36 12 25c0-9 7-17 16-11 2 1 3 2 4 4 1-2 2-3 4-4 9-6 16 2 16 11 0 11-7 22-20 32Z" fill="#d94444" stroke="#a82c2f" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M22 15c5 0 7 2 10 6 3-4 5-6 10-6-2-5-6-8-10-8s-8 3-10 8Z" fill="#55b878" stroke="#2d7d4d" stroke-width="2" stroke-linejoin="round"/>
      <path d="M27 29l-3 2m15 1l-3 2m-6 8l-3 2m17 0l-3 2" stroke="#ffd166" stroke-width="3" stroke-linecap="round"/>
      <path d="M24 22c-3 3-5 7-5 12" fill="none" stroke="#ff8d7d" stroke-width="3" stroke-linecap="round" opacity=".55"/>
    </symbol>
    <symbol id="banana" viewBox="0 0 64 64">
      <path d="M10 39c17 16 39 8 49-19-15 12-31 17-48 8-4 4-4 8-1 11Z" fill="#f2c849" stroke="#a97a16" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M14 34c16 8 31 3 43-12-10 23-30 31-47 17" fill="none" stroke="#7d5b10" stroke-width="4" stroke-linecap="round"/>
      <path d="M13 30c5 3 10 5 16 6" stroke="#fff0a3" stroke-width="3" stroke-linecap="round" opacity=".8"/>
      <path d="M55 20l5-3M10 28l-5-3" stroke="#7d5b10" stroke-width="4" stroke-linecap="round"/>
    </symbol>
    <symbol id="lemon" viewBox="0 0 64 64">
      <path d="M13 35c7-16 21-24 38-22 3 17-5 31-22 38-8-2-14-8-16-16Z" fill="#f0c84a" stroke="#bf8e17" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M33 15c6-8 12-10 18-7-3 7-8 9-18 7Z" fill="#55b878" stroke="#2d7d4d" stroke-width="2" stroke-linejoin="round"/>
      <path d="M20 39c10-4 19-11 27-21" stroke="#fff0a3" stroke-width="5" stroke-linecap="round" opacity=".72"/>
      <path d="M27 45c6-3 12-8 18-15" stroke="#d39c21" stroke-width="3" stroke-linecap="round" opacity=".55"/>
    </symbol>
  </defs>

  <rect width="512" height="512" rx="104" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <g transform="rotate(-13 131 283)">
      <rect x="60" y="180" width="132" height="194" rx="24" fill="url(#card)" stroke="#b8922c" stroke-width="7"/>
      <rect x="76" y="198" width="100" height="158" rx="16" fill="none" stroke="#ffffff" stroke-opacity=".65" stroke-width="4"/>
      <g filter="url(#soft-shadow)">
        <use href="#banana" x="84" y="254" width="42" height="42"/>
        <use href="#banana" x="126" y="254" width="42" height="42"/>
      </g>
    </g>

    <g transform="rotate(13 381 283)">
      <rect x="320" y="180" width="132" height="194" rx="24" fill="url(#card)" stroke="#b8922c" stroke-width="7"/>
      <rect x="336" y="198" width="100" height="158" rx="16" fill="none" stroke="#ffffff" stroke-opacity=".65" stroke-width="4"/>
      <g filter="url(#soft-shadow)">
        <use href="#lemon" x="363" y="204" width="42" height="42"/>
        <use href="#lemon" x="363" y="255" width="42" height="42"/>
        <use href="#lemon" x="363" y="306" width="42" height="42"/>
      </g>
    </g>

    <g>
      <rect x="184" y="106" width="144" height="236" rx="28" fill="url(#card)" stroke="#f0c44a" stroke-width="8"/>
      <rect x="201" y="124" width="110" height="200" rx="18" fill="none" stroke="#ffffff" stroke-opacity=".72" stroke-width="4"/>
      <g filter="url(#soft-shadow)">
        <use href="#strawberry" x="211" y="144" width="43" height="43"/>
        <use href="#strawberry" x="258" y="144" width="43" height="43"/>
        <use href="#strawberry" x="211" y="260" width="43" height="43"/>
        <use href="#strawberry" x="258" y="260" width="43" height="43"/>
      </g>
    </g>
  </g>
</svg>
