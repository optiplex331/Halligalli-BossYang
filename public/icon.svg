  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <path d="M22 100c18 10 66 10 84 0" fill="none" stroke="#f0c44a" stroke-opacity=".22" stroke-width="3" stroke-linecap="round"/>
  <g filter="url(#shadow)">
    <rect x="25" y="38" width="40" height="58" rx="8" fill="url(#card)" stroke="#b8922c" stroke-width="2" transform="rotate(-12 45 67)"/>
    <rect x="63" y="38" width="40" height="58" rx="8" fill="url(#card)" stroke="#b8922c" stroke-width="2" transform="rotate(12 83 67)"/>
    <rect x="44" y="27" width="40" height="68" rx="9" fill="url(#card)" stroke="#f0c44a" stroke-width="2"/>
