  <use href="#banana" x="34" y="56" width="22" height="22" transform="rotate(-12 45 67)"/>
  <use href="#lemon" x="76" y="56" width="22" height="22" transform="rotate(12 83 67)"/>
  <use href="#strawberry" x="53" y="43" width="24" height="24"/>
